name: Build & Release Android APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🧹 Cleanup Submodule Ghosts
        run: |
          git config --local --unset-all submodule.temp_assets_check.url || true
          git config --local --unset-all submodule.temp_assets_check.path || true
          rm -rf .git/modules/temp_assets_check || true

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          npm install
          npm install -g eas-cli

      - name: 🚀 Build Android APK (Multi-Arch)
        run: |
          mkdir -p build
          eas build --platform android --profile production-apk --local --non-interactive --output build/aether-universal.apk

      - name: 📝 Generate Release Notes & Tutorial
        run: |
          cat <<EOF > release_notes.md
          ## 🌌 Aether v$(node -p "require('./app.json').expo.version")

          ### 📦 Download & Install Guide
          To install Aether on your Android device:
          1. **Download:** Click on the \`aether-universal.apk\` asset below.
          2. **Open:** Once downloaded, tap the file in your notification bar or downloads folder.
          3. **Permissions:** If prompted, allow "Install from Unknown Sources" in your browser/file manager settings.
          4. **Install:** Follow the system prompts to complete the installation.
          5. **Play:** Find the celestial 'A' icon in your app drawer and enjoy!

          ### ✨ What's New
          - Complete 3D beveled block graphics overhaul.
          - Indestructible Survival Engine for Infinite mode.
          - Multi-level Puzzle mode with strategic gem placement.
          - Professional celestial branding and onboarding.
          EOF

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: build/aether-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
