name: Build & Release Android APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏷️ Get version from app.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: 🚀 Build Android APK (Universal)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          mkdir -p build
          cp android/app/build/outputs/apk/release/app-release.apk build/aether-universal.apk

      - name: 📝 Generate Release Notes
        run: |
          cat <<EOF > release_notes.md
          ## 🌌 Aether v${{ steps.get_version.outputs.version }}

          ### 📦 Download & Install Guide
          1. **Download:** Click on \`aether-universal.apk\` below.
          2. **Open:** Tap the file once downloaded.
          3. **Permissions:** Allow "Install from Unknown Sources" if prompted.
          4. **Enjoy:** Find the celestial 'A' icon in your app drawer.
          EOF

      - name: 🏷️ Ensure Release Tag Exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.get_version.outputs.version }} || echo "Tag exists"
          git push origin v${{ steps.get_version.outputs.version }} || echo "Tag pushed"

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          files: build/aether-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
