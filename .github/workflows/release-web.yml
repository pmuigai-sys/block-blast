name: Release Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🧹 Cleanup Submodule Ghosts
        run: |
          git config --local --unset-all submodule.temp_assets_check.url || true
          git config --local --unset-all submodule.temp_assets_check.path || true
          rm -rf .git/modules/temp_assets_check || true

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏷️ Get version from app.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 Build Web
        run: npx expo export -p web

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🏷️ Auto-Update Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="v${{ steps.get_version.outputs.version }}"
          # Delete existing tag locally and remotely to force update
          git tag -d $TAG_NAME || true
          git push origin :refs/tags/$TAG_NAME || true
          # Create and push fresh tag
          git tag $TAG_NAME
          git push origin $TAG_NAME

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
