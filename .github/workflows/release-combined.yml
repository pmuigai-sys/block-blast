name: Release Aether

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  increment-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_new_version.outputs.version }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🆙 Increment Version
        id: get_new_version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Increment npm version (patch)
          npm version patch --no-git-tag-version
          NEW_VER=$(node -p "require('./package.json').version")
          
          # Sync to app.json
          node -e "let app = require('./app.json'); app.expo.version = '$NEW_VER'; require('fs').writeFileSync('./app.json', JSON.stringify(app, null, 2))"
          
          git add package.json app.json
          git commit -m "chore: bump version to $NEW_VER [skip ci]" || echo "No changes to commit"
          git push origin main
          
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

  build-web:
    needs: increment-version
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🧹 Cleanup Submodule Ghosts
        run: |
          git config --local --unset-all submodule.temp_assets_check.url || true
          git config --local --unset-all submodule.temp_assets_check.path || true
          rm -rf .git/modules/temp_assets_check || true

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build Web
        run: npx expo export -p web

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🏷️ Update Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="v${{ needs.increment-version.outputs.new_version }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME

  deploy-web:
    needs: [increment-version, build-web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    needs: [increment-version, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: 🚀 Build Android APK (Universal)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          mkdir -p build
          cp android/app/build/outputs/apk/release/app-release.apk build/aether-universal.apk

      - name: 📝 Generate Release Notes
        run: |
          cat <<EOF > release_notes.md
          ## 🌌 Aether v${{ needs.increment-version.outputs.new_version }}

          ### 📦 Download & Install Guide
          1. **Download:** Click on \`aether-universal.apk\` below.
          2. **Open:** Tap the file once downloaded.
          3. **Permissions:** Allow "Install from Unknown Sources" if prompted.
          4. **Enjoy:** Find the celestial 'A' icon in your app drawer.
          EOF

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.increment-version.outputs.new_version }}
          body_path: release_notes.md
          files: build/aether-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
